<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Dubai 24 - Fully Responsive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-orange: #f36f21;
            --dark-bg: #232f3e;
            --light-grey: #f8f8f8;
            --text-dark: #333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }

        /* --- HEADER RESPONSIVE --- */
        .top-bar {
            background: #fff;
            padding: 8px 5%;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            border-bottom: 1px solid #eee;
            color: #666;
        }

        .nav-main {
            background: var(--dark-bg);
            color: white;
            display: flex;
            align-items: center;
            padding: 0 5%;
            flex-wrap: wrap;
        }

        .browse-categories {
            background: var(--primary-orange);
            padding: 15px 25px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .menu-items {
            display: flex;
            list-style: none;
        }

        .menu-items li {
            padding: 15px;
            font-size: 14px;
            cursor: pointer;
        }

        /* --- SEARCH SECTION --- */
        .search-container {
            padding: 20px 5%;
            display: flex;
            align-items: center;
            background: #fff;
            gap: 20px;
            flex-wrap: wrap;
        }

        .logo h2 { color: var(--dark-bg); font-size: 24px; }
        .logo span { color: var(--primary-orange); }

        .search-bar {
            flex-grow: 1;
            display: flex;
            border: 2px solid var(--primary-orange);
            border-radius: 5px;
            min-width: 250px;
        }

        .search-bar select { border: none; padding: 10px; background: #f9f9f9; display: none; }
        .search-bar input { border: none; padding: 10px; flex-grow: 1; outline: none; }
        .search-bar button { background: white; border: none; padding: 10px 15px; cursor: pointer; }

        /* --- HERO (THE FULL VIEW BACKGROUND) --- */
        .hero {
            /* Replace with your image URL */
            background: linear-gradient(rgba(255,255,255,0.3), rgba(255,255,255,0.3)), url('https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?auto=format&fit=crop&w=1500&q=80') no-repeat center center;
            background-size: cover;
            height: 450px;
            display: flex;
            align-items: center;
            padding: 0 5%;
            position: relative;
            transition: height 0.3s ease;
        }

        .hero-text h1 { font-size: clamp(30px, 8vw, 50px); margin: 10px 0; }
        .hero-text h1 span { color: var(--primary-orange); }

        /* --- POPUP SYSTEM --- */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none; justify-content: center; align-items: center;
            z-index: 9999; padding: 10px;
        }

        .popup-card {
            display: flex; width: 100%; max-width: 850px; background: #fff; 
            border-radius: 8px; overflow: hidden; position: relative;
            flex-direction: row; max-height: 90vh; overflow-y: auto;
        }

        .close-trigger {
            position: absolute; right: 15px; top: 10px;
            font-size: 30px; color: #aaa; cursor: pointer; z-index: 100;
        }

        .popup-left {
            flex: 1; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&w=600&q=80');
            background-size: cover; color: white; padding: 40px;
            display: flex; flex-direction: column; justify-content: center;
        }

        .popup-right { flex: 1.2; padding: 30px; position: relative; }
        .popup-right h3 { text-align: center; margin-bottom: 15px; font-size: 18px; }

        .reg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .reg-grid input, .reg-grid select { padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }

        .btn-reg {
            width: 100%; padding: 14px; background: #2c3e50; color: white;
            border: none; border-radius: 4px; font-weight: bold; margin-top: 15px; cursor: pointer;
        }

        .social-icons { display: flex; justify-content: center; gap: 20px; margin-top: 10px; font-size: 22px; }

        /* --- MOBILE MEDIA QUERIES (THE FIX) --- */
        @media (max-width: 768px) {
            .hero {
                height: 100vh; /* FULL VIEW ON MOBILE */
                background-position: 70% center; /* Shift focus to show person/subject */
            }
            
            .popup-card {
                flex-direction: column; /* Stack image on top of form */
            }

            .popup-left {
                padding: 30px 20px;
                text-align: center;
            }

            .reg-grid {
                grid-template-columns: 1fr; /* Form inputs stack in one column */
            }

            .menu-items, .top-bar div:first-child {
                display: none; /* Clean up header for mobile */
            }

            .top-bar {
                justify-content: center;
            }

            .search-container {
                flex-direction: column;
                align-items: stretch;
            }

            .close-trigger {
                color: #fff; /* White X on mobile image */
            }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div>Welcome To B2BDubai24.com</div>
        <div>English | AED | <i class="far fa-user"></i> Sign In / Register</div>
    </div>

    <nav class="nav-main">
        <div class="browse-categories"><i class="fas fa-bars"></i> Categories</div>
        <ul class="menu-items">
            <li>Home</li>
            <li>Vendors</li>
            <li>Shop</li>
        </ul>
    </nav>

    <div class="search-container">
        <div class="logo"><h2>B2B<span>DUBAI24</span></h2></div>
        <div class="search-bar">
            <input type="text" placeholder="Search for products...">
            <button><i class="fas fa-search"></i></button>
        </div>
    </div>

    <section class="hero">
        <div class="hero-text">
            <p style="font-weight: bold; color: var(--primary-orange);">B2B & MARKETPLACE</p>
            <h1>B2B Dubai <span>24</span></h1>
            <p>Find Verified Suppliers collection</p>
        </div>
    </section>

    <div id="popupOverlay" class="overlay">
        <div id="popupBox" class="popup-card">
            <span class="close-trigger" onclick="closePopup()">&times;</span>

            <div class="popup-left">
                <p style="color:#ff9800; font-weight:bold; font-size:18px;">LIMITED OFFER</p>
                <h2 style="margin: 10px 0;">Free to Join</h2>
                <p style="font-size: 13px; margin-bottom: 20px;">First 100 Suppliers Join Free!</p>
                <div style="display:flex;">
                    <input type="text" placeholder="Email" style="padding:10px; border:none; flex-grow:1; border-radius: 4px 0 0 4px;">
                    <button style="background:#333; color:#fff; border:none; padding:10px 15px; cursor:pointer; border-radius: 0 4px 4px 0;">OK</button>
                </div>
            </div>

            <div class="popup-right">
                <h3>REGISTER AS FREE</h3>
                <div class="reg-grid">
                    <input type="text" placeholder="Full Name*">
                    <input type="text" placeholder="Company Name">
                    <input type="text" placeholder="Phone*">
                    <input type="email" placeholder="Email*">
                    <input type="password" placeholder="Password*">
                    <input type="text" placeholder="Products*">
                </div>
                <button class="btn-reg">Get Started</button>
                <div class="social-icons">
                    <i class="fab fa-facebook" style="color:#3b5998"></i>
                    <i class="fab fa-google" style="color:#db4437"></i>
                    <i class="fab fa-linkedin" style="color:#0077b5"></i>
                </div>
            </div>
        </div>
    </div>

    <script>
        const overlay = document.getElementById('popupOverlay');
        const popupBox = document.getElementById('popupBox');
        let timeLeft = 5000;
        let timer;

        window.onload = () => {
            setTimeout(() => {
                overlay.style.display = 'flex';
                startTimer();
            }, 5000);
        };

        function startTimer() {
            timer = setTimeout(closePopup, timeLeft);
        }

        function closePopup() {
            overlay.style.display = 'none';
        }

        // Pause on hover
        popupBox.onmouseenter = () => clearTimeout(timer);
        popupBox.onmouseleave = () => startTimer();

        window.onclick = (e) => { if(e.target == overlay) closePopup(); }
    </script>
</body>
</html>
